<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Общий рейтинг классов - 2026</title>
    <link rel="stylesheet" href="stat.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">Oriental<span>School</span></div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">🗓️ Расписание</a>
            <a href="students.html" class="nav-btn">👥 Ученики</a>
            <a href="stat.html" class="nav-btn active">📊 Рейтинг</a>
        </div>
        <div class="nav-actions">
            <button class="lang-btn" onclick="toggleLang()">RU / UZ</button>
            <button class="print-btn" onclick="window.print()">🖨️ Печать отчета</button>
        </div>
    </nav>

    <div class="container">
        <div class="summary-grid">
            <div class="stat-card blue">
                <h4 id="tTotalSch">Всего учащихся</h4>
                <p id="valTotal">0</p>
            </div>
            <div class="stat-card gold">
                <h4 id="tBestClass">Лучший класс</h4>
                <p id="valBest">-</p>
            </div>
            <div class="stat-card green">
                <h4 id="tAvgSchool">Средний показатель школы</h4>
                <p id="valAvg">0%</p>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <h3 id="tRatingTitle">🏆 Общий рейтинг классов (в процентах)</h3>
                <div id="ratingListWrapper">
                    </div>
            </div>

            <div class="card">
                <h3 id="tInpTitle">📝 Ввод итогов мониторинга</h3>
                <div class="form-group">
                    <label>Выберите класс:</label>
                    <select id="statClassSelect"></select>
                    
                    <label>Общий показатель успеваемости (%):</label>
                    <input type="number" id="scoreInput" min="0" max="100" placeholder="Напр: 85">
                    
                    <button class="btn-save" id="btnSaveStat" onclick="saveClassRating()">Обновить рейтинг</button>
                    <p class="hint">* Введите средний процент по всем предметам для этого класса.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="stat.js"></script>
</body>
</html>
